name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write # required to create a github release

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # required for GoReleaser to accurately generate changelogs

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: ~> v2
          args: release --clean
        env:
          # GitHub automatically provides this token representing the actions bot
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
